# Fraud Detection Webapp — Service
# Exposes the webapp via NodePort so it's accessible from outside the cluster.
# Access: http://<any-node-ip>:30800
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
  namespace: fraud-detection
  labels:
    app: fraud-detection
spec:
  type: NodePort
  selector:
    app: fraud-detection
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
