# ── Filebeat DaemonSet ──
resources:
  requests:
    cpu: "50m"
    memory: "100Mi"
  limits:
    cpu: "200m"
    memory: "200Mi"

# Thu thập log từ tất cả containers
filebeatConfig:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"

    output.elasticsearch:
      hosts: ["http://elasticsearch-master.logging.svc.cluster.local:9200"]
      index: "filebeat-%{+yyyy.MM.dd}"

    setup.template.name: "filebeat"
    setup.template.pattern: "filebeat-*"
    setup.ilm.enabled: false

    # Kibana dashboard auto-setup
    setup.kibana:
      host: "http://kibana-kibana.logging.svc.cluster.local:5601"

# Cho phép đọc log trên tất cả nodes
tolerations:
  - effect: NoSchedule
    operator: Exists
